name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # pnpm version must match packageManager field in root package.json
  PNPM_VERSION: "11.2.2"
  NODE_VERSION: "22"

jobs:
  # ── 1. Type-check both apps ────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --filter web typecheck

      - name: Typecheck api
        run: pnpm --filter api typecheck

  # ── 2. Unit tests (no Supabase needed) ────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests — web
        run: pnpm --filter web test:unit

      - name: Unit tests — api
        run: pnpm --filter api test:unit

  # ── 3. Integration tests (real local Supabase stack) ──────────────────────
  # Only on: push→main, or any PR. Skipped for push→develop (typecheck+unit is enough).
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Cache Supabase Docker images — saves ~4-6 min of image pulls per run
      - name: Cache Supabase Docker images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations and seed
        run: supabase db reset

      - name: Export Supabase connection vars to GitHub env
        # `supabase status -o env` emits KEY=value lines — pipe directly into
        # $GITHUB_ENV so subsequent steps see SUPABASE_URL, SUPABASE_ANON_KEY,
        # SUPABASE_SERVICE_ROLE_KEY, etc. without us echoing them into the log.
        run: supabase status -o env >> $GITHUB_ENV

      - name: Integration tests — api
        run: pnpm --filter api test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop
